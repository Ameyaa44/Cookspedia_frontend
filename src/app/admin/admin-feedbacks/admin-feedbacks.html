<div class="container-fluid">
    <div class="row">
        <div class="col-sm-12 col-md-3 p-0" style="min-height: 100vh;">
            <app-admin-sidebar/>
        </div>
        <div class="col-sm-12 col-md-9">
            <h3 class="mt-2 display-4">Feedbacks</h3>
            @if(feedbackList.length>0){
            <!-- Table -->
             <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Feedback</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    @for(feedback of feedbackList;track $index){
                    <tr>
                        <td>{{$index+1}}</td>
                        <td>{{feedback?.name}}</td>
                        <td>{{feedback?.email}}</td>
                        <td>{{feedback?.feedback}}</td>
                        <td>
                            <button class="btn" (click)="deleteFeedback(feedback?._id)">
                                <i class="fa-solid fa-trash text-danger"></i>
                            </button>
                        </td>
                    </tr>
                    }

                </tbody>
             </table>
            }

        </div>
    </div>
</div>
